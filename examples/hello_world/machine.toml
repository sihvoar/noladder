# examples/hello_world/machine.toml
#
# hello_world example — mock Modbus pump + tank sensors
# No hardware required — Python mock bus serves synthetic data
#
# Start order:
#   Terminal 1: python3 tools/noladder_mock_bus.py examples/hello_world/machine.toml
#   Terminal 2: cargo run --bin noladder-bus  -- examples/hello_world/machine.toml
#   Terminal 3: cargo run --example hello_world_os
#   Terminal 4: cargo run --example hello_world
#   Terminal 5: python3 tools/noladder_monitor.py examples/hello_world/machine.toml

[general]
cycle_ms = 10

[bus.modbus0]
interface = "127.0.0.1"
port      = 5502
cycle_ms  = 10

# inputs:  demo.pump.speed (rpm), demo.pump.current (A)
# outputs: demo.pump.setpoint (rpm), demo.pump.enable (bool)
[device."demo.pump"]
bus  = "modbus0"
node = 0
type = "vfd"
note = "mock pump"

# inputs: demo.sensors.0 (level %), demo.sensors.1 (pressure bar),
#         demo.sensors.2 (temp °C), demo.sensors.3 (flow l/min)
[device."demo.sensors"]
bus  = "modbus0"
node = 1
type = "analog_in"
note = "mock tank sensors"
