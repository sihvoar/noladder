<svg xmlns="http://www.w3.org/2000/svg" width="400" height="80" viewBox="0 0 400 80">
  <!-- NoLadder logo — dark version, path based icon -->
  <!-- Copyright 2025 Your Name — SPDX-License-Identifier: MIT -->

  <!-- background -->
  <rect width="400" height="80" fill="#181f19" rx="6"/>

  <!-- cycle mark centered at 36,40 -->
  <g transform="translate(36, 40)">
    <path
      d="M 0,-19 A 19,19 0 1,1 -14,13"
      fill="none"
      stroke="#5cba6e"
      stroke-width="4"
      stroke-linecap="round"/>
    <polygon points="-14,19 -20,11 -8,11" fill="#5cba6e"/>
  </g>

  <!-- wordmark -->
  <text
    x="66"
    y="52"
    font-family="system-ui, sans-serif"
    font-size="36"
    font-weight="600"
    fill="#e8f5ea"
    letter-spacing="-0.02em">NoLadder</text>

  <!-- accent line -->
  <line
    x1="66" y1="62"
    x2="330" y2="62"
    stroke="#3aad50"
    stroke-width="1.5"
    stroke-linecap="round"/>

</svg>
